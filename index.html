<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSH · 作战指挥室</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background:#0a0a0a; color:#e8e8e8;
    font-family:-apple-system,"Segoe UI","PingFang SC",sans-serif;
    line-height:1.6; overflow-x:hidden;
  }
  section {
    min-height:100vh; display:flex; flex-direction:column;
    justify-content:center; align-items:center; padding:8vw; text-align:center;
  }
  .fade { opacity:0; transform:translateY(30px); transition:all 1s ease; }
  .fade.show { opacity:1; transform:translateY(0); }
  h1 { font-size:clamp(3rem,12vw,7rem); font-weight:800; letter-spacing:.1em; }
  .tag { color:#00ff88; letter-spacing:.3em; font-size:.9rem; margin-top:1rem; }
  .manifesto { font-size:clamp(1.1rem,3vw,1.6rem); max-width:600px; margin-top:2rem; color:#aaa; }
  .scroll-hint { position:absolute; bottom:3rem; color:#555; font-size:.8rem; animation:bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(10px);} }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:3rem 5rem; margin-top:3rem; }
  .num { font-size:clamp(2.5rem,8vw,4.5rem); font-weight:800; color:#00ff88; }
  .label { color:#888; font-size:.85rem; letter-spacing:.15em; margin-top:.5rem; }
  .card { transition:transform .3s; }
  .card:hover { transform:scale(1.08); }
  .cta { font-size:clamp(1.3rem,4vw,2rem); font-weight:600; }
  footer { color:#444; font-size:.75rem; padding:2rem; text-align:center; }
</style>
</head>
<body>

<!-- 第一屏：Hero -->
<section>
  <h1 class="fade show">CSH</h1>
  <!-- ↓ 这句是你的宣言，随便改 -->
  <p class="tag fade show">AI 情报 · 信息差猎手</p>
  <p class="manifesto fade show">我帮你跨过 AI 信息差那道坎——你只需要比昨天多会一步。</p>
  <div class="scroll-hint">↓ 向下滚动</div>
</section>

<!-- 第二屏：数字墙 -->
<section>
  <p class="tag fade">— 战场刻度 —</p>
  <div class="grid">
    <div class="card fade"><div class="num" data-target="770">0</div><div class="label">多邻国连续打卡 · 天</div></div>
    <div class="card fade"><div class="num" data-target="770">0</div><div class="label">健身坚持 · 天</div></div>
    <div class="card fade"><div class="num" data-target="8">0</div><div class="label">一手情报缴获 · 条</div></div>
    <div class="card fade"><div class="num" data-target="5">0</div><div class="label">同行者 · 人</div></div>
  </div>
</section>

<!-- 第三屏：CTA -->
<section>
  <p class="cta fade">这里不卖幻觉。<br>只记录一个人，如何一天推进一步。</p>
  <p class="tag fade" style="margin-top:2rem;">CSH · 持续更新中</p>
</section>

<footer>© 2025 CSH · 自留地已成阵地</footer>

<script>
  // 淡入
  const io = new IntersectionObserver((es)=>es.forEach(e=>{
    if(e.isIntersecting){ e.target.classList.add('show');
      if(e.target.querySelector('.num')) countUp(e.target.querySelector('.num')); }
  }),{threshold:.3});
  document.querySelectorAll('.fade').forEach(el=>io.observe(el));
  // 数字滚动
  function countUp(el){
    const t=+el.dataset.target; let n=0; const step=Math.ceil(t/60);
    const timer=setInterval(()=>{ n+=step; if(n>=t){n=t;clearInterval(timer);} el.textContent=n; },25);
  }
  // 首屏数字立即滚
  document.querySelectorAll('section:first-child .num').forEach(countUp);
</script>

</body>
</html>
