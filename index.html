<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSH · AI情报站</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; color:#e6edf3; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
  .hero { min-height:60vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:40px 20px; }
  .hero h1 { font-size:2.4em; letter-spacing:2px; }
  .hero h1 span { color:#3fb950; }
  .hero p { margin-top:16px; color:#8b949e; font-size:1.05em; }
  .wall { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px; max-width:800px; margin:0 auto; padding:20px; }
  .card { border:1px solid #30363d; border-radius:10px; padding:28px 12px; text-align:center; }
  .card .num { font-size:2.2em; font-weight:700; color:#3fb950; }
  .card .label { margin-top:8px; color:#8b949e; font-size:0.9em; }
  .manifesto { text-align:center; padding:60px 20px; color:#8b949e; line-height:1.9; }
  .manifesto strong { color:#e6edf3; }
  footer { text-align:center; padding:30px; color:#484f58; font-size:0.8em; }
</style>
</head>
<body>
  <div class="hero">
    <h1>CSH <span>·</span> AI情报站</h1>
    <p>外网一手AI情报 · 自费实测 · 数字全真实，实时更新</p>
  </div>
  <div class="wall">
    <div class="card"><div class="num">770</div><div class="label">天 · 打卡不间断</div></div>
    <div class="card"><div class="num">770</div><div class="label">天 · 健身不间断</div></div>
    <div class="card"><div class="num">8</div><div class="label">条 · 一手情报缴获</div></div>
    <div class="card"><div class="num">5</div><div class="label">人 · 同行者</div></div>
  </div>
  <div class="manifesto">
    <p>一件事连续做 <strong>770 天</strong>是什么概念——我可以演示给你看。</p>
    <p>这里的每一个数字都经得起查，<strong>包括那些还很小的。</strong></p>
    <p>2025.7 起跑，欢迎围观一个闭环从零长出来。</p>
  </div>
  <footer>CSH · 数字实时更新 · 无一句虚构</footer>
</body>
</html>
